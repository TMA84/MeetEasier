<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - MeetEasier</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.9;
      line-height: 1.6;
    }

    .retry-button {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.8);
      color: #fff;
      padding: 1rem 2rem;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .retry-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .status {
      margin-top: 2rem;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Keine Verbindung</h1>
    <p>
      Die Verbindung zum Server wurde unterbrochen.<br>
      Bitte überprüfen Sie Ihre Netzwerkverbindung.
    </p>
    <button class="retry-button" onclick="location.reload()">
      Erneut versuchen
    </button>
    <div class="status" id="status"></div>
  </div>

  <script>
    // Auto-retry every 10 seconds
    let retryCount = 0;
    const maxRetries = 30; // 5 minutes

    function checkConnection() {
      retryCount++;
      document.getElementById('status').textContent = 
        `Automatischer Verbindungsversuch ${retryCount}/${maxRetries}...`;

      fetch('/api/health', { method: 'HEAD', cache: 'no-cache' })
        .then(response => {
          if (response.ok) {
            location.reload();
          }
        })
        .catch(() => {
          if (retryCount < maxRetries) {
            setTimeout(checkConnection, 10000);
          } else {
            document.getElementById('status').textContent = 
              'Maximale Anzahl an Versuchen erreicht. Bitte manuell neu laden.';
          }
        });
    }

    // Start checking after 5 seconds
    setTimeout(checkConnection, 5000);

    // Also check when page becomes visible again
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        checkConnection();
      }
    });
  </script>
</body>
</html>
